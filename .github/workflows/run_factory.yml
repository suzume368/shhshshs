
name: Content Factory Orchestrator (One-Click + Logs)

on:
  schedule:
    - cron: '0 9,17 * * *'  # 9 AM & 5 PM UTC
  workflow_dispatch:         # Manual one-click trigger

jobs:
  automate-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install Dependencies
        run: pip install requests openai kaggle

      # 4. Process queue, generate script, create pipeline_data.json
      - name: Process Queue & Generate Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 << 'PYTHON_EOF'
          import os, json, requests, re
          from datetime import datetime, timezone
          from openai import OpenAI

          print("🧠 Starting Orchestrator...")
          with open('reel_queue.json', 'r') as f:
              queue_data = json.load(f)

          queue = queue_data.get('queue', [])
          processed_urls = {item['url'] for item in queue_data.get('processed', [])}
          
          print(f"📊 Queue: {len(queue)} pending, {len(processed_urls)} done")

          next_reel = None
          for reel in queue:
              url = reel.get('url', '').strip()
              if 'instagram.com/reel/' not in url: continue
              if url in processed_urls:
                  print(f"⏭️ Skipped (Duplicate): {url}")
                  continue
              next_reel = reel
              print(f"🎯 SELECTED: {url}")
              break

          if not next_reel:
              print("✅ No new reels. Exiting.")
              exit(0)

          match = re.search(r'/reel/([^/?]+)', next_reel['url'])
          shortcode = match.group(1) if match else "unknown"
          username = next_reel.get('username', 'unknown')

          # Generate ultra-short script (14s = ~35 words)
          print("🤖 Generating AI Script...")
          client = OpenAI(api_key=os.environ['GROQ_API_KEY'], base_url='https://api.groq.com/openai/v1')
          prompt = f"Write a 14-second YouTube Shorts script (MAX 35 words). Start with a BOLD HOOK in all caps. One actionable AI tip. End with 'Save this'. No fluff."
          
          response = client.chat.completions.create(
              model="llama-3.3-70b-versatile",
              messages=[
                  {"role": "system", "content": "YouTube Shorts expert. Ultra-concise, high-impact."},
                  {"role": "user", "content": prompt}
              ],
              max_tokens=100,
              temperature=0.8
          )
          script = response.choices[0].message.content.strip()

          # Create pipeline_data.json
          pipeline = {
              "reel_url": next_reel['url'],
              "shortcode": shortcode,
              "username": username,
              "script_text": script,
              "youtube_title": f"AI Hack You Need #shorts",
              "youtube_description": f"Quick tip from @{username}. #ai #tech",
              "youtube_tags": ["AI", "Shorts", "Tech"]
          }
          with open('pipeline_data.json', 'w') as f:
              json.dump(pipeline, f, indent=2)

          # Mark as in_progress
          entry = {
              "url": next_reel['url'],
              "username": username,
              "status": "in_progress",
              "started_at": datetime.now(timezone.utc).isoformat()
          }
          queue_data.setdefault('processed', []).append(entry)
          with open('reel_queue.json', 'w') as f:
              json.dump(queue_data, f, indent=2)

          print("✅ pipeline_data.json ready")
          PYTHON_EOF

      # 5. Commit changes
      - name: Commit Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reel_queue.json pipeline_data.json
          if git diff-index --quiet HEAD --; then
            echo "ℹ️ No changes to commit."
          else
            git commit -m "Auto: Queued reel [skip ci]"
            git push
          fi

      # 6. 🔥 PUSH TO KAGGLE + STREAM LOGS (BULLETPROOF VERSION)
      - name: Push to Kaggle & Stream Logs
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KERNEL_ID: "${{ secrets.KAGGLE_USERNAME }}/content-factory-engine"
        run: |
          set -e  # Exit on error
          
          echo "🔐 Setting up Kaggle authentication..."
          
          # ✅ CRITICAL: Use $HOME instead of ~ for reliable path expansion
          KAGGLE_DIR="$HOME/.kaggle"
          mkdir -p "$KAGGLE_DIR"
          
          # ✅ CRITICAL: Use printf for reliable JSON creation (handles special chars)
          printf '{"username":"%s","key":"%s"}\n' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > "$KAGGLE_DIR/kaggle.json"
          chmod 600 "$KAGGLE_DIR/kaggle.json"
          
          # Verify file exists and is valid
          echo "📄 Verifying kaggle.json..."
          if [ ! -f "$KAGGLE_DIR/kaggle.json" ]; then
            echo "❌ ERROR: kaggle.json not created at $KAGGLE_DIR/kaggle.json"
            exit 1
          fi
          python3 -c "import json,os; f=os.environ['HOME']+'/.kaggle/kaggle.json'; d=json.load(open(f)); print(f'✅ Valid: user={d[\"username\"]}, key_len={len(d[\"key\"])}')"
          
          # Install/upgrade Kaggle CLI
          echo "📦 Ensuring latest Kaggle CLI..."
          pip install --upgrade -q kaggle
          
          # Test authentication with a lightweight command
          echo "🧪 Testing authentication..."
          if ! kaggle kernels list -m 1 --csv 2>&1 | head -1 | grep -q .; then
            echo "❌ Auth test failed. Check KAGGLE_KEY secret."
            echo "💡 Tip: Regenerate token at https://www.kaggle.com/settings → API"
            exit 1
          fi
          echo "✅ Authentication successful!"
          
          # Push code to Kaggle
          echo "🚀 Pushing code to Kaggle..."
          if ! kaggle kernels push -p . 2>&1 | tee push.log; then
            echo "❌ Push failed:"
            cat push.log
            exit 1
          fi
          echo "✅ Push successful!"
          
          # Wait for Kaggle to queue the run
          echo "⏳ Waiting for Kaggle to queue execution (~60s)..."
          sleep 60
          
          # 🔄 POLLING & LOG STREAMING LOOP
          echo "::group::📜 KAGGLE LIVE LOGS (Updates every 30s)"
          
          TIMEOUT=1800  # 30 minutes max
          INTERVAL=30   # Poll every 30 seconds
          ELAPSED=0
          LAST_LOG_HASH=""
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Get status
            STATUS_LINE=$(kaggle kernels status "$KERNEL_ID" 2>/dev/null || echo "unknown")
            STATUS=$(echo "$STATUS_LINE" | grep -oi "running\|complete\|error\|queued" | tail -1 || echo "unknown")
            
            echo "📊 [$((ELAPSED/60))m ${ELAPSED}s] Status: $STATUS"
            
            # Check terminal states
            if [ "$STATUS" = "complete" ]; then
              echo "✅ Execution finished successfully!"
              break
            elif [ "$STATUS" = "error" ]; then
              echo "❌ Execution failed. Fetching error logs..."
              kaggle kernels output "$KERNEL_ID" -p /tmp/kaggle_output 2>/dev/null || true
              if [ -f /tmp/kaggle_output/README.md ]; then
                echo "📄 Error details:"
                cat /tmp/kaggle_output/README.md
              fi
              exit 1
            fi
            
            # Fetch and stream NEW log lines only (avoid spam)
            kaggle kernels output "$KERNEL_ID" -p /tmp/kaggle_output 2>/dev/null || true
            if [ -d /tmp/kaggle_output ] && [ -f /tmp/kaggle_output/README.md ]; then
              CURRENT_HASH=$(md5sum /tmp/kaggle_output/README.md 2>/dev/null | cut -d' ' -f1 || echo "")
              if [ "$CURRENT_HASH" != "$LAST_LOG_HASH" ] && [ -n "$CURRENT_HASH" ]; then
                echo "📥 New logs received:"
                cat /tmp/kaggle_output/README.md
                LAST_LOG_HASH="$CURRENT_HASH"
              fi
            fi
            
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          
          echo "::endgroup::"
          
          # Final check
          if [ "$STATUS" != "complete" ]; then
            echo "⚠️ Timeout reached or incomplete. Final logs:"
            kaggle kernels output "$KERNEL_ID" -p /tmp/kaggle_output 2>/dev/null || true
            [ -f /tmp/kaggle_output/README.md ] && cat /tmp/kaggle_output/README.md
            echo "💡 Check Kaggle manually: https://www.kaggle.com/$KERNEL_ID"
          fi
          
          echo "✅ Kaggle step complete!"

      # 7. Final summary
      - name: Final Summary
        run: |
          echo "========================================="
          echo "✅ ONE-CLICK AUTOMATION COMPLETE"
          echo "📁 pipeline_data.json pushed to Kaggle"
          echo "📜 Logs streamed to this console"
          echo "🔗 Monitor anytime: https://www.kaggle.com/${{ secrets.KAGGLE_USERNAME }}/content-factory-engine"
          echo "========================================="

