name: Content Factory Orchestrator (Duplicate-Proof)

on:
  schedule:
    - cron: '0 9,17 * * *'  # Runs at 9 AM & 5 PM UTC
  workflow_dispatch:         # Allows manual trigger

jobs:
  process-queue:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Allows the bot to push files back to repo

    steps:
      # 1. Checkout your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install lightweight dependencies
      - name: Install Dependencies
        run: pip install requests openai

      # 4. Run the Queue Logic (Checks Duplicates & Generates Script)
      #4. Process queue → generate pipeline_data.json
      - name: Process Queue & Generate Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 << 'EOF'
          import os, json, re
          from datetime import datetime, timezone
          from openai import OpenAI
          
          with open('reel_queue.json', 'r') as f:
              data = json.load(f)
          
          queue = data.get('queue', [])
          processed = {p['url'] for p in data.get('processed', [])}
          
          pick = None
          for r in queue:
              if r['url'] not in processed and 'instagram.com/reel/' in r['url']:
                  pick = r
                  break
          
          if not pick:
              print("✅ No new reels. Exiting.")
              exit(0)
          
          sc = re.search(r'/reel/([^/?]+)', pick['url']).group(1)
          user = pick.get('username', 'unknown')
          
          client = OpenAI(api_key=os.environ['GROQ_API_KEY'], base_url='https://api.groq.com/openai/v1')
          resp = client.chat.completions.create(
              model="llama-3.3-70b-versatile",
              messages=[
                  {"role":"system","content":"YouTube Shorts expert. Max 35 words. Bold hook. One tip. CTA."},
                  {"role":"user","content":f"Write a 14s script inspired by @{user}"}
              ],
              max_tokens=100
          )
          script = resp.choices[0].message.content.strip()
          
          with open('pipeline_data.json', 'w') as f:
              json.dump({
                  "reel_url": pick['url'], "shortcode": sc, "username": user,
                  "script_text": " ",
                  "youtube_title": f"AI Hack #shorts",
                  "youtube_description": f"Tip from @{user}. #ai",
                  "youtube_tags": ["AI","Shorts"]
              }, f, indent=2)
          
          data.setdefault('processed', []).append({
              "url": pick['url'], "username": user,
              "status": "in_progress", "started_at": datetime.now(timezone.utc).isoformat()
          })
          with open('reel_queue.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(f"✅ Queued: {pick['url']}")
          EOF

          

          #          # ✅ FIXED: Create pipeline_data.json with error handling & proper encoding
          # print("📝 Creating pipeline_data.json...")
          
          # pipeline = {
          #     "reel_url": next_reel['url'],
          #     "shortcode": shortcode,
          #     "username": username,
          #     "script_text": "",  # Empty since using original video content
          #     "youtube_title": f"AI Tip You Need To Know #shorts",
          #     "youtube_description": f"Analysis of @{username}'s content. #ai #tech",
          #     "youtube_tags": ["AI", "Tech", "Shorts"],
          #     "use_original_script": True,  # Flag for Kaggle
          #     "created_at": datetime.now(timezone.utc).isoformat()
          # }

          # try:
          #     # Write with explicit encoding and flush
          #     with open('pipeline_data.json', 'w', encoding='utf-8') as f:
          #         json.dump(pipeline, f, indent=2, ensure_ascii=False)
