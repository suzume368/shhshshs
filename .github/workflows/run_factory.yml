          #         os.fsync(f.fileno())  # Ensure data is physically written
              
          #     # Verify file was created and has content
          #     if os.path.exists('pipeline_data.json') and os.path.getsize('pipeline_data.json') > 0:
          #         print(f"✅ pipeline_data.json created successfully ({os.path.getsize('pipeline_data.json')} bytes)")
          #         # Optional: Print first 200 chars for debugging
          #         with open('pipeline_data.json', 'r', encoding='utf-8') as f:
          #             preview = f.read(200)
          #             print(f"📄 Preview: {preview}...")
          #     else:
          #         print("❌ ERROR: pipeline_data.json is empty or missing after write")
          #         exit(1)
                  
          # except Exception as e:
          #     print(f"❌ FAILED to write pipeline_data.json: {e}")
          #     import traceback
          #     traceback.print_exc()
          #     exit(1)

          # # Mark as "in_progress" in Queue to prevent race conditions
          # entry = {
          #     "url": next_reel['url'],
          #     "username": username,
          #     "status": "in_progress",
          #     "started_at": datetime.now(timezone.utc).isoformat()
          # }
          # queue_data.setdefault('processed', []).append(entry)
          
          # with open('reel_queue.json', 'w') as f:
          #     json.dump(queue_data, f, indent=2)

          # print("✅ Files ready for Kaggle trigger.")
          # PYTHON_EOF

      # 5. Commit changes back to GitHub
      - name: Commit Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reel_queue.json pipeline_data.json
          if git diff-index --quiet HEAD --; then
            echo "ℹ️ No changes to commit."
          else
            git commit -m "Auto: Picked next reel [skip ci]"
            git push
          fi

      # 6. Trigger Kaggle (Using Kaggle CLI)
      - name: Trigger Kaggle Notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python3 trigger.py

