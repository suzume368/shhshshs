
name: Content Factory Orchestrator (Python API Trigger)

on:
  schedule:
    - cron: '0 9,17 * * *'  # 9 AM & 5 PM UTC
  workflow_dispatch:         # Manual one-click trigger

jobs:
  automate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install Dependencies
        run: pip install requests openai kaggle

      # 4. Process queue → generate pipeline_data.json
      - name: Process Queue & Generate Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 << 'EOF'
          import os, json, re
          from datetime import datetime, timezone
          from openai import OpenAI
          
          with open('reel_queue.json', 'r') as f:
              data = json.load(f)
          
          queue = data.get('queue', [])
          processed = {p['url'] for p in data.get('processed', [])}
          
          pick = None
          for r in queue:
              if r['url'] not in processed and 'instagram.com/reel/' in r['url']:
                  pick = r
                  break
          
          if not pick:
              print("✅ No new reels. Exiting.")
              exit(0)
          
          sc = re.search(r'/reel/([^/?]+)', pick['url']).group(1)
          user = pick.get('username', 'unknown')
          
          client = OpenAI(api_key=os.environ['GROQ_API_KEY'], base_url='https://api.groq.com/openai/v1')
          resp = client.chat.completions.create(
              model="llama-3.3-70b-versatile",
              messages=[
                  {"role":"system","content":"YouTube Shorts expert. Max 35 words. Bold hook. One tip. CTA."},
                  {"role":"user","content":f"Write a 14s script inspired by @{user}"}
              ],
              max_tokens=100
          )
          script = resp.choices[0].message.content.strip()
          
          with open('pipeline_data.json', 'w') as f:
              json.dump({
                  "reel_url": pick['url'], "shortcode": sc, "username": user,
                  "script_text": script,
                  "youtube_title": f"AI Hack #shorts",
                  "youtube_description": f"Tip from @{user}. #ai",
                  "youtube_tags": ["AI","Shorts"]
              }, f, indent=2)
          
          data.setdefault('processed', []).append({
              "url": pick['url'], "username": user,
              "status": "in_progress", "started_at": datetime.now(timezone.utc).isoformat()
          })
          with open('reel_queue.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(f"✅ Queued: {pick['url']}")
          EOF

      # 5. Commit & Push (Triggers GitHub → Kaggle Sync)
      - name: Commit & Push Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reel_queue.json pipeline_data.json kaggle_deploy/ trigger.py
          git diff-index --quiet HEAD -- || git commit -m "Auto: queued reel [skip ci]" && git push || true
          echo "✅ Data committed. GitHub-Kaggle sync will detect update within ~60s."

      # 6. 🔥 TRIGGER KAGGLE VIA OFFICIAL PYTHON API
      - name: Trigger Kaggle Execution via Python API
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_PUSH_FOLDER: "./kaggle_deploy"
          KAGGLE_KERNEL_ID: "muhammadasjad2008/content-factory-engine"
          KAGGLE_WAIT_MINUTES: "0"
          KAGGLE_SYNC_WAIT_SECONDS: "50"
        run: python3 trigger.py

      # 7. Final Status
      - name: Final Status
        run: |
          echo "========================================="
          echo "✅ ONE-CLICK AUTOMATION COMPLETE"
          echo "📁 pipeline_data.json committed"
          echo "🔥 Kaggle execution triggered via Python API"
          echo "🔗 Monitor: https://www.kaggle.com/muhammadasjad2008/content-factory-engine"
          echo "========================================="



        
