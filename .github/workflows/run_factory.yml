name: Content Factory Orchestrator (Notebook)

on:
  schedule:
    - cron: '0 9,17 * * *'  # 9 AM & 5 PM UTC
  workflow_dispatch:         # Manual one-click trigger

jobs:
  push-notebook:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies for queue processing
      - name: Install Dependencies
        run: pip install requests openai

      # 4. Process queue & generate pipeline_data.json
      - name: Process Queue & Generate Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 << 'PYTHON_EOF'
          import os, json, requests, re
          from datetime import datetime, timezone
          from openai import OpenAI

          print("🧠 Starting Orchestrator...")
          with open('reel_queue.json', 'r') as f:
              queue_data = json.load(f)

          queue = queue_data.get('queue', [])
          processed_urls = {item['url'] for item in queue_data.get('processed', [])}
          
          print(f"📊 Queue: {len(queue)} pending, {len(processed_urls)} done")

          next_reel = None
          for reel in queue:
              url = reel.get('url', '').strip()
              if 'instagram.com/reel/' not in url: continue
              if url in processed_urls:
                  print(f"⏭️ Skipped (Duplicate): {url}")
                  continue
              next_reel = reel
              print(f"🎯 SELECTED: {url}")
              break

          if not next_reel:
              print("✅ No new reels. Exiting.")
              exit(0)

          match = re.search(r'/reel/([^/?]+)', next_reel['url'])
          shortcode = match.group(1) if match else "unknown"
          username = next_reel.get('username', 'unknown')

          # Generate ultra-short script (14s = ~35 words)
          print("🤖 Generating AI Script...")
          client = OpenAI(api_key=os.environ['GROQ_API_KEY'], base_url='https://api.groq.com/openai/v1')
          prompt = f"Write a 14-second YouTube Shorts script (MAX 35 words). Start with a BOLD HOOK in all caps. One actionable AI tip. End with 'Save this'. No fluff."
          
          response = client.chat.completions.create(
              model="llama-3.3-70b-versatile",
              messages=[
                  {"role": "system", "content": "YouTube Shorts expert. Ultra-concise, high-impact."},
                  {"role": "user", "content": prompt}
              ],
              max_tokens=100,
              temperature=0.8
          )
          script = response.choices[0].message.content.strip()

          # Create pipeline_data.json
          pipeline = {
              "reel_url": next_reel['url'],
              "shortcode": shortcode,
              "username": username,
              "script_text": script,
              "youtube_title": f"AI Hack You Need #shorts",
              "youtube_description": f"Quick tip from @{username}. #ai #tech",
              "youtube_tags": ["AI", "Shorts", "Tech"]
          }
          with open('pipeline_data.json', 'w') as f:
              json.dump(pipeline, f, indent=2)

          # Mark as in_progress
          entry = {
              "url": next_reel['url'],
              "username": username,
              "status": "in_progress",
              "started_at": datetime.now(timezone.utc).isoformat()
          }
          queue_data.setdefault('processed', []).append(entry)
          with open('reel_queue.json', 'w') as f:
              json.dump(queue_data, f, indent=2)

          print("✅ pipeline_data.json ready")
          PYTHON_EOF

      # 5. Commit changes
      - name: Commit Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reel_queue.json pipeline_data.json
          if git diff-index --quiet HEAD --; then
            echo "ℹ️ No changes to commit."
          else
            git commit -m "Auto: Queued reel [skip ci]"
            git push
          fi

      # 6. 🔥 PUSH NOTEBOOK TO KAGGLE (Simple & Reliable)
      - name: Push Notebook to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "🔐 Setting up Kaggle auth..."
          mkdir -p ~/.kaggle
          printf '{"username":"%s","key":"%s"}\n' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          
          pip install -q kaggle
          
          echo "🚀 Pushing notebook to Kaggle..."
          kaggle kernels push -p .
          
          echo "✅ Push complete!"
          echo "📅 Kaggle will auto-run on its schedule (check notebook settings)"
          echo "🔗 Monitor: https://www.kaggle.com/$KAGGLE_USERNAME/content-factory-engine"

